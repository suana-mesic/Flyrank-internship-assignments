<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suana Mešić — Backend Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #2A2024;
      --main: #6E2A46;
      --accent: #B04A67;
      --bg: #FDF7F8;
      --muted: #8A7580;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.5;
    }

    main {
      max-width: 40rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2.75rem, 9vw, 5rem);
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.05;
    }

    .wordmark .dot { color: var(--main); }

    .claim {
      margin-top: 1.25rem;
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      color: var(--text);
      font-weight: 400;
    }

    .sub {
      margin-top: 0.75rem;
      font-size: clamp(0.85rem, 2.8vw, 1rem);
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .soon {
      margin-top: 2.5rem;
      display: inline-block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.4rem 1rem;
    }

    @media (prefers-reduced-motion: no-preference) {
      main { animation: rise 0.7s ease-out; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="wordmark">Suana<span class="dot">.</span></h1>
    <p class="claim">I turn messy requirements into clean, reliable backend code.</p>
    <p class="sub">Junior Backend Developer · Databases · Clean Architecture</p>
    <span class="soon">Portfolio coming soon</span>
  </main>
</body>
</html>
